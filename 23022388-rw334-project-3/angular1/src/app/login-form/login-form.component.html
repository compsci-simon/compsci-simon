<form class="border p-5" [formGroup]="myForm" (ngSubmit)="submitHandler()">
  <legend>Log In</legend>

  <mat-form-field>
    <mat-label>Username</mat-label>
    <input type="text" matInput formControlName="username">
    <mat-error *ngIf="username.invalid">
      Field Required
    </mat-error>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Password</mat-label>
    <input type="password" matInput formControlName="password">
    <mat-error *ngIf="password.invalid">
      Field Required
    </mat-error>
  </mat-form-field>

  <mat-checkbox formControlName="remember">Remember me</mat-checkbox>

  <button mat-stroked-button class="mt-3" type="submit" [disabled]="myForm.invalid">Log in</button>

</form>
